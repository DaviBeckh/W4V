<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>PiruZap Wear</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#000;
  touch-action:pan-y;
}

/* 💀 */

body.morto{
  filter:grayscale(100%) brightness(0.45);
}

/* APP */

.app{

  width:300vw;
  height:100vh;

  display:flex;

  transition:transform .35s ease;

}

/* TELAS */

.page{

  width:100vw;
  height:100vh;

  flex-shrink:0;

  overflow-y:auto;

  padding:18px;

  display:flex;
  flex-direction:column;
  align-items:center;

  scroll-behavior:smooth;

}

/* TITULO */

.logo{

  margin-top:8px;

  font-size:28px;
  font-weight:700;

  color:#ff5f87;

}

/* INPUT */

textarea{

  width:100%;
  height:150px;

  margin-top:18px;

  border:none;
  outline:none;

  resize:none;

  border-radius:26px;

  background:#1b1b1b;

  color:white;

  padding:20px;

  font-size:17px;

}

/* BOTAO */

.btn{

  width:100%;

  margin-top:18px;

  border:none;

  border-radius:999px;

  background:#ff4f79;

  color:white;

  padding:18px;

  font-size:18px;
  font-weight:bold;

}

/* SWIPE DICA */

.swipe{

  margin-top:18px;

  font-size:12px;

  opacity:.5;

}

/* CARDS */

.card{

  width:100%;

  background:#171717;

  border-radius:20px;

  padding:12px;

  margin-top:10px;

  color:white;

}

.titulo{

  color:#ff5f87;

  font-weight:bold;

  margin-bottom:8px;

  font-size:14px;

}

.mensagem{

  font-size:14px;

  line-height:1.4;

  word-break:break-word;

}

.data{

  margin-top:10px;

  font-size:10px;

  opacity:.5;

  text-align:right;

}

.valor{

  font-size:24px;

  font-weight:bold;

}

/* BARRINHAS */

.bolhas{

  position:fixed;

  bottom:10px;

  left:50%;

  transform:translateX(-50%);

  display:flex;

  gap:8px;

}

.bola{

  width:7px;
  height:7px;

  border-radius:50%;

  background:#555;

  transition:.3s;

}

.bola.active{
  background:#ff5f87;
}

/* SCROLL */

::-webkit-scrollbar{
  width:0;
}

</style>
</head>

<body>

<div class="app" id="app">

  <!-- ✍️ PAGINA 1 -->
  <div class="page">

    <div class="logo">
      PiruZap
    </div>

    <textarea
      id="mensagem"
      placeholder="Mensagem..."
    ></textarea>

    <button class="btn"
    onclick="enviarMensagem()">

      Enviar

    </button>

    <div class="swipe">
      ← arrasta →
    </div>

  </div>

  <!-- 💌 PAGINA 2 -->
  <div class="page">

    <div class="logo">
      💌
    </div>

    <div id="container"></div>

  </div>

  <!-- 📊 PAGINA 3 -->
  <div class="page">

    <div class="logo">
      📊
    </div>

    <div class="card">

      <div class="titulo">
        Acessos
      </div>

      <div class="valor"
      id="acessosSo">
        0
      </div>

    </div>

    <div class="card">

      <div class="titulo">
        Cartas
      </div>

      <div class="valor"
      id="cartaSo">
        0
      </div>

    </div>

    <div class="card">

      <div class="titulo">
        Estado
      </div>

      <div class="valor"
      id="estadoAtual">
        ...
      </div>

    </div>

  </div>

</div>

<!-- INDICADORES -->

<div class="bolhas">

  <div class="bola active"></div>
  <div class="bola"></div>
  <div class="bola"></div>

</div>

<script>

/* 🔥 FIREBASE */

const firebaseConfig = {

  apiKey: "SUA_API_KEY",
  authDomain: "book4so.firebaseapp.com",
  databaseURL:
  "https://book4so-default-rtdb.firebaseio.com",
  projectId: "book4so"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* =========================
   SWIPE ENTRE TELAS
========================= */

const app =
document.getElementById("app");

const bolas =
document.querySelectorAll(".bola");

let pagina = 0;

function atualizarPagina(){

  app.style.transform =
  `translateX(-${pagina * 100}vw)`;

  bolas.forEach((b,i)=>{

    b.classList.toggle(
      "active",
      i === pagina
    );

  });

}

let startX = 0;

document.addEventListener(
"touchstart",

e=>{

  startX =
  e.touches[0].clientX;

});

document.addEventListener(
"touchend",

e=>{

  let endX =
  e.changedTouches[0].clientX;

  let diff =
  startX - endX;

  if(diff > 50 && pagina < 2){

    pagina++;
    atualizarPagina();

  }

  if(diff < -50 && pagina > 0){

    pagina--;
    atualizarPagina();

  }

});

/* =========================
   ENVIAR
========================= */

function enviarMensagem(){

  const texto =
  document.getElementById(
    "mensagem"
  ).value;

  if(texto.trim() === ""){

    return alert("Escreve algo");

  }

  const contadorRef =
  db.ref('contadorM');

  contadorRef.transaction(
  current => {

    return (current || 0) + 1;

  })

  .then(result=>{

    const numero =
    result.snapshot.val();

    return db.ref(
    'respostas/MnhPG' + numero

    ).set({

      mensagem:texto,
      data:new Date()
      .toLocaleString()

    });

  })

  .then(()=>{

    document.getElementById(
    "mensagem"
    ).value = "";

  });

}

/* =========================
   CHAT
========================= */

const container =
document.getElementById(
"container"
);

db.ref("respostas")
.on("value",snapshot=>{

  container.innerHTML = "";

  const dados =
  snapshot.val();

  if(!dados) return;

  const ordenado =
  Object.keys(dados)

  .filter(id =>
    id.startsWith("RSofia")
  )

  .sort((a,b)=>{

    return parseInt(
      b.replace("RSofia","")
    )

    -

    parseInt(
      a.replace("RSofia","")
    );

  });

  ordenado.forEach(id=>{

    const item =
    dados[id];

    const div =
    document.createElement("div");

    div.classList.add("card");

    div.innerHTML = `

      <div class="titulo">
        ${id}
      </div>

      <div class="mensagem">
        ${item.mensagem}
      </div>

      <div class="data">
        ${item.data}
      </div>

    `;

    container.appendChild(div);

  });

});

/* =========================
   CONTADORES
========================= */

db.ref("acessosSo")
.on("value",snapshot=>{

  document.getElementById(
  "acessosSo"
  ).innerText =

  snapshot.val() || 0;

});

db.ref("cartaSo")
.on("value",snapshot=>{

  document.getElementById(
  "cartaSo"
  ).innerText =

  snapshot.val() || 0;

});

/* =========================
   ESTADO
========================= */

db.ref("estadoSite")
.on("value",snapshot=>{

  const estado =
  snapshot.val();

  document.getElementById(
  "estadoAtual"
  ).innerText = estado;

  if(estado === "morto"){

    document.body
    .classList.add("morto");

  }else{

    document.body
    .classList.remove("morto");

  }

});

</script>

</body>
</html>
