<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiruZap</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background-color: #FFC0CB;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: 1s;
}

/* 💀 MODO MORTO */
body.morto {
  filter: grayscale(100%) brightness(0.4) contrast(1.2);
  background: #2c2c2c !important;
}

.tela {
  display: none;
  width: 100%;
  max-width: 500px;
}

.ativa {
  display: block;
}

h1 {
  margin-top: 30px;
  color: white;
  text-align: center;
}

textarea {
  width: 90%;
  height: 150px;
  border-radius: 15px;
  border: none;
  padding: 15px;
  font-size: 15px;
  margin-top: 20px;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
}

.enviar {
  background: #ff4d6d;
  color: white;
}

.ver {
  background: white;
  color: #ff4d6d;
}

.voltar {
  position: fixed;
  top: 15px;
  left: 15px;
  background: white;
  color: #ff4d6d;
  z-index: 999;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.titulo {
  font-weight: bold;
  color: #ff4d6d;
  margin-bottom: 10px;
}

.data {
  font-size: 11px;
  color: #999;
  text-align: right;
}

.painelValor {
  font-size: 25px;
  font-weight: bold;
  color: #333;
}
</style>
</head>

<body>

<!-- ✍️ TELA PRINCIPAL -->
<div id="telaEnviar" class="tela ativa">

  <h1>PiruZap</h1>

  <textarea id="mensagem" placeholder="Escreve aqui..."></textarea>

  <button class="enviar" onclick="enviarMensagem()">Enviar</button>
  <button class="ver" onclick="mostrarRespostas()">Chat dela</button>
  <button class="ver" onclick="abrirPainel()">Painel</button>

</div>

<!-- 💌 TELA RESPOSTAS -->
<div id="telaRespostas" class="tela">

  <button class="voltar" onclick="voltar()">←</button>

  <h1>💌</h1>

  <div id="container"></div>

</div>

<!-- 📊 PAINEL -->
<div id="telaPainel" class="tela">

  <button class="voltar" onclick="voltarPainel()">←</button>

  <h1>📊 Painel</h1>

  <div class="card">
    <div class="titulo">Acessos Sofia</div>
    <div id="acessosSo" class="painelValor">0</div>
  </div>

  <div class="card">
    <div class="titulo">Cartas Sofia</div>
    <div id="cartaSo" class="painelValor">0</div>
  </div>

  <div class="card">
    <div class="titulo">Estado do Site</div>
    <div id="estadoAtual" class="painelValor">Carregando...</div>
  </div>

</div>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCKa219_gQ7_1Br1fCM-PHW3ev9AEzZZJ8",
  authDomain: "book4so.firebaseapp.com",
  databaseURL: "https://book4so-default-rtdb.firebaseio.com",
  projectId: "book4so"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// 🔄 TROCAR TELAS
function mostrarRespostas() {
  document.getElementById("telaEnviar").classList.remove("ativa");
  document.getElementById("telaRespostas").classList.add("ativa");
}

function voltar() {
  document.getElementById("telaRespostas").classList.remove("ativa");
  document.getElementById("telaEnviar").classList.add("ativa");
}

// 📊 ABRIR PAINEL
function abrirPainel() {
  document.getElementById("telaEnviar").classList.remove("ativa");
  document.getElementById("telaPainel").classList.add("ativa");
}

function voltarPainel() {
  document.getElementById("telaPainel").classList.remove("ativa");
  document.getElementById("telaEnviar").classList.add("ativa");
}

// ✍️ ENVIAR MENSAGEM
function enviarMensagem() {

  const texto = document.getElementById("mensagem").value;

  if (texto.trim() === "") {
    alert("Escreve algo!");
    return;
  }

  const contadorRef = db.ref('contadorM');

  contadorRef.transaction((current) => {
    return (current || 0) + 1;
  })

  .then((result) => {

    const numero = result.snapshot.val();

    return db.ref('respostas/MnhPG' + numero).set({
      mensagem: texto,
      data: new Date().toLocaleString()
    });

  })

  .then(() => {

    alert("Enviado!");
    document.getElementById("mensagem").value = "";

  });

}

// 💌 CARREGAR RESPOSTAS
const container = document.getElementById("container");

db.ref("respostas").on("value", (snapshot) => {

  container.innerHTML = "";

  const dados = snapshot.val();

  if (!dados) return;

  const ordenado = Object.keys(dados)

    .filter(id => id.startsWith("RSofia"))

    .sort((a, b) => {

      const numA = parseInt(a.replace("RSofia",""));
      const numB = parseInt(b.replace("RSofia",""));

      return numB - numA;

    });

  ordenado.forEach(id => {

    const item = dados[id];

    const div = document.createElement("div");

    div.classList.add("card");

    div.innerHTML = `
      <div class="titulo">${id}</div>
      <div class="mensagem">${item.mensagem}</div>
      <div class="data">${item.data}</div>
    `;

    container.appendChild(div);

  });

});

// 📈 CONTADOR DE ACESSOS
db.ref("acessosSo").on("value", (snapshot) => {

  const total = snapshot.val() || 0;

  document.getElementById("acessosSo").innerText =
    total;

});

// 💌 CONTADOR DE CARTAS
db.ref("cartaSo").on("value", (snapshot) => {

  const total = snapshot.val() || 0;

  document.getElementById("cartaSo").innerText =
    total;

});

// 💀 ESTADO DO SITE
db.ref("estadoSite").on("value", (snapshot) => {

  const estado = snapshot.val();

  document.getElementById("estadoAtual").innerText =
    estado;

  if (estado === "morto") {

    document.body.classList.add("morto");

  } else {

    document.body.classList.remove("morto");

  }

});

</script>

</body>
</html>
