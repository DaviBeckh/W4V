<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PiruZap Wear OS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:#000;
  color:white;
  width:100vw;
  height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* 💀 MODO MORTO */
body.morto{
  filter:grayscale(100%) brightness(0.5);
}

.watch{

  width:100%;
  height:100%;
  max-width:390px;
  max-height:390px;

  border-radius:50%;
  background:#111;

  overflow:hidden;
  position:relative;

  display:flex;
  justify-content:center;
  align-items:center;

}

/* TELA */

.tela{
  display:none;
  width:100%;
  height:100%;
  padding:25px;

  overflow-y:auto;
}

.ativa{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* TÍTULO */

h1{
  font-size:22px;
  margin-top:10px;
  margin-bottom:15px;
  color:#ff5c8a;
}

/* INPUT */

textarea{
  width:100%;
  height:110px;

  border:none;
  border-radius:18px;

  padding:15px;

  resize:none;

  background:#222;
  color:white;

  outline:none;

  font-size:14px;
}

/* BOTÕES */

button{

  width:100%;
  border:none;
  border-radius:20px;

  padding:12px;

  margin-top:10px;

  font-size:14px;
  font-weight:bold;

  cursor:pointer;

}

.enviar{
  background:#ff4d6d;
  color:white;
}

.ver{
  background:white;
  color:#ff4d6d;
}

.voltar{

  position:absolute;
  top:15px;
  left:15px;

  width:42px;
  height:42px;

  border-radius:50%;

  background:#fff;
  color:#ff4d6d;

  font-size:18px;

}

/* CARD */

.card{

  width:100%;

  background:#1f1f1f;

  border-radius:18px;

  padding:15px;

  margin-bottom:12px;

}

.titulo{
  color:#ff5c8a;
  font-weight:bold;
  margin-bottom:8px;
}

.mensagem{
  font-size:14px;
  line-height:1.4;
}

.data{
  margin-top:8px;
  font-size:10px;
  color:#999;
  text-align:right;
}

/* PAINEL */

.painelValor{
  font-size:24px;
  font-weight:bold;
  margin-top:5px;
}

/* SCROLL */

::-webkit-scrollbar{
  width:0;
}

</style>
</head>

<body>

<div class="watch">

<!-- ✍️ TELA PRINCIPAL -->
<div id="telaEnviar" class="tela ativa">

  <h1>PiruZap</h1>

  <textarea id="mensagem" placeholder="Mensagem..."></textarea>

  <button class="enviar" onclick="enviarMensagem()">
    Enviar
  </button>

  <button class="ver" onclick="mostrarRespostas()">
    Chat
  </button>

  <button class="ver" onclick="abrirPainel()">
    Painel
  </button>

</div>

<!-- 💌 RESPOSTAS -->
<div id="telaRespostas" class="tela">

  <button class="voltar" onclick="voltar()">
    ←
  </button>

  <h1>💌</h1>

  <div id="container"></div>

</div>

<!-- 📊 PAINEL -->
<div id="telaPainel" class="tela">

  <button class="voltar" onclick="voltarPainel()">
    ←
  </button>

  <h1>Painel</h1>

  <div class="card">
    <div class="titulo">Acessos</div>
    <div id="acessosSo" class="painelValor">0</div>
  </div>

  <div class="card">
    <div class="titulo">Cartas</div>
    <div id="cartaSo" class="painelValor">0</div>
  </div>

  <div class="card">
    <div class="titulo">Estado</div>
    <div id="estadoAtual" class="painelValor">
      ...
    </div>
  </div>

</div>

</div>

<script>

// 🔥 FIREBASE

const firebaseConfig = {

  apiKey: "SUA_API_KEY",
  authDomain: "book4so.firebaseapp.com",
  databaseURL: "https://book4so-default-rtdb.firebaseio.com",
  projectId: "book4so"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* =========================
   TROCAR TELAS
========================= */

function mostrarRespostas(){

  document.getElementById("telaEnviar")
  .classList.remove("ativa");

  document.getElementById("telaRespostas")
  .classList.add("ativa");

}

function voltar(){

  document.getElementById("telaRespostas")
  .classList.remove("ativa");

  document.getElementById("telaEnviar")
  .classList.add("ativa");

}

function abrirPainel(){

  document.getElementById("telaEnviar")
  .classList.remove("ativa");

  document.getElementById("telaPainel")
  .classList.add("ativa");

}

function voltarPainel(){

  document.getElementById("telaPainel")
  .classList.remove("ativa");

  document.getElementById("telaEnviar")
  .classList.add("ativa");

}

/* =========================
   ENVIAR MENSAGEM
========================= */

function enviarMensagem(){

  const texto =
    document.getElementById("mensagem").value;

  if(texto.trim() === ""){

    alert("Escreve algo!");
    return;

  }

  const contadorRef = db.ref('contadorM');

  contadorRef.transaction((current)=>{

    return (current || 0) + 1;

  })

  .then((result)=>{

    const numero = result.snapshot.val();

    return db.ref('respostas/MnhPG' + numero).set({

      mensagem:texto,
      data:new Date().toLocaleString()

    });

  })

  .then(()=>{

    alert("Enviado!");

    document.getElementById("mensagem").value = "";

  });

}

/* =========================
   RESPOSTAS
========================= */

const container =
  document.getElementById("container");

db.ref("respostas").on("value",(snapshot)=>{

  container.innerHTML = "";

  const dados = snapshot.val();

  if(!dados) return;

  const ordenado = Object.keys(dados)

  .filter(id => id.startsWith("RSofia"))

  .sort((a,b)=>{

    const numA =
      parseInt(a.replace("RSofia",""));

    const numB =
      parseInt(b.replace("RSofia",""));

    return numB - numA;

  });

  ordenado.forEach(id=>{

    const item = dados[id];

    const div =
      document.createElement("div");

    div.classList.add("card");

    div.innerHTML = `

      <div class="titulo">${id}</div>

      <div class="mensagem">
        ${item.mensagem}
      </div>

      <div class="data">
        ${item.data}
      </div>

    `;

    container.appendChild(div);

  });

});

/* =========================
   ACESSOS
========================= */

db.ref("acessosSo").on("value",(snapshot)=>{

  document.getElementById("acessosSo")
  .innerText = snapshot.val() || 0;

});

/* =========================
   CARTAS
========================= */

db.ref("cartaSo").on("value",(snapshot)=>{

  document.getElementById("cartaSo")
  .innerText = snapshot.val() || 0;

});

/* =========================
   ESTADO SITE
========================= */

db.ref("estadoSite").on("value",(snapshot)=>{

  const estado = snapshot.val();

  document.getElementById("estadoAtual")
  .innerText = estado;

  if(estado === "morto"){

    document.body.classList.add("morto");

  }else{

    document.body.classList.remove("morto");

  }

});

</script>

</body>
</html>
